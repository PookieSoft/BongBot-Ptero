name: PR CI & Test

# Thin caller for PookieSoft/workflows pr-ci.

on:
    pull_request:
        types: [opened, synchronize, labeled]
        branches: [main]

permissions:
    checks: write
    pull-requests: write
    packages: read

jobs:
    ci:
        uses: PookieSoft/workflows/.github/workflows/pr-ci.yml@v1
        with:
            runtime: node
            build-docker: true
            smoke-test: true
            ssh-deploy: true
            docker-image-name: bongbot-ptero-develop
            service-name-prefix: bongbot-ptero-develop
            coverage-comment: true
            environment: Dev
        secrets: inherit
