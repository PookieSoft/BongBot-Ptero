name: Create Release and Deploy BongBot-Ptero

# Thin caller for PookieSoft/workflows release.

on:
    push:
        branches: [main]

permissions:
    contents: write
    pull-requests: read
    packages: write

jobs:
    release:
        uses: PookieSoft/workflows/.github/workflows/release.yml@v1
        with:
            runtime: node
            build-docker: true
            docker-image-name: bongbot-ptero
            publish-package: true
            codecov-slug: PookieSoft/BongBot-Ptero
            environment: Prod
        secrets: inherit
